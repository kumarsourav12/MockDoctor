name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Run OpenAPI example smoke check
        run: npm run dev -- compare --config ./examples/openapi/mockdoctor.config.json

      - name: Run JSON contract example smoke check
        run: npm run dev -- compare --config ./examples/json-contract/mockdoctor.config.json

      - name: Summarize job
        run: |
          {
            echo "## Verification summary"
            echo ""
            echo "- Node.js: ${{ matrix.node-version }}"
            echo "- Typecheck: \`npm run check\`"
            echo "- Tests: \`npm test\`"
            echo "- Build: \`npm run build\`"
            echo "- OpenAPI example: \`npm run dev -- compare --config ./examples/openapi/mockdoctor.config.json\`"
            echo "- JSON contract example: \`npm run dev -- compare --config ./examples/json-contract/mockdoctor.config.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

  action-smoke:
    name: GitHub Action smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run action against matching contract
        id: matching
        uses: ./
        with:
          readyapi: ./test/fixtures/readyapi/orders-project.xml
          openapi: ./test/fixtures/contracts/orders-openapi-renamed-path-params.yaml

      - name: Verify matching outputs
        run: |
          test "${{ steps.matching.outputs.drift-detected }}" = "false"
          test "${{ steps.matching.outputs.issues-count }}" = "0"

      - name: Run action against drift fixture without failing workflow
        id: drift
        uses: ./
        with:
          readyapi: ./test/fixtures/readyapi/orders-project-schema-drift.xml
          openapi: ./test/fixtures/contracts/orders-openapi.yaml
          html-report: ./artifacts/mockdoctor-drift.html
          fail-on-drift: false

      - name: Verify drift outputs
        run: |
          test "${{ steps.drift.outputs.drift-detected }}" = "true"
          test "${{ steps.drift.outputs.issues-count }}" = "1"
          test -f "${{ steps.drift.outputs.html-report-path }}"
