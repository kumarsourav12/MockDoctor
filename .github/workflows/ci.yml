name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Run OpenAPI example smoke check
        run: npm run dev -- compare --config ./examples/openapi/mockdoctor.config.json

      - name: Run JSON contract example smoke check
        run: npm run dev -- compare --config ./examples/json-contract/mockdoctor.config.json

      - name: Summarize job
        run: |
          {
            echo "## Verification summary"
            echo ""
            echo "- Node.js: ${{ matrix.node-version }}"
            echo "- Typecheck: \`npm run check\`"
            echo "- Tests: \`npm test\`"
            echo "- Build: \`npm run build\`"
            echo "- OpenAPI example: \`npm run dev -- compare --config ./examples/openapi/mockdoctor.config.json\`"
            echo "- JSON contract example: \`npm run dev -- compare --config ./examples/json-contract/mockdoctor.config.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
