openapi: 3.0.3
info:
  title: Orders API
  version: 1.0.0
paths:
  /api/orders/{id}:
    get:
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [id, status, amount]
                properties:
                  id: { type: string }
                  status: { type: string }
                  amount: { type: integer }
  /api/orders:
    get:
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required: [id, status, amount]
                      properties:
                        id: { type: string }
                        status: { type: string }
                        amount: { type: integer }
  /api/health:
    get:
      responses:
        "200":
          description: Service health
          content:
            text/plain:
              schema:
                type: string
