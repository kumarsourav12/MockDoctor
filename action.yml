name: MockDoctor
description: Compare ReadyAPI REST virtual-service files against OpenAPI or JSON contracts in GitHub Actions.

inputs:
  config:
    description: Path to a mockdoctor config file inside the caller repository.
    required: false
  readyapi:
    description: Path to a ReadyAPI project XML file or extracted REST service directory.
    required: false
  openapi:
    description: Path to an OpenAPI contract file.
    required: false
  contract:
    description: Path to a JSON contract file.
    required: false
  service:
    description: Comma-separated or newline-separated ReadyAPI service names to compare.
    required: false
  format:
    description: Report format to print in the action log. Use text or json.
    required: false
    default: text
  html-report:
    description: Path to write an HTML report when drift is found.
    required: false
  working-directory:
    description: Directory in the caller repository where MockDoctor should run.
    required: false
    default: .
  fail-on-drift:
    description: Set to false to keep the workflow green when drift is found.
    required: false
    default: "true"
  telemetry-endpoint:
    description: Optional HTTPS endpoint that receives one JSON usage event per action run.
    required: false
  telemetry-token:
    description: Optional bearer token for the telemetry endpoint.
    required: false

outputs:
  drift-detected:
    description: true when MockDoctor found at least one issue.
    value: ${{ steps.mockdoctor.outputs.drift-detected }}
  issues-count:
    description: Number of issues found during comparison.
    value: ${{ steps.mockdoctor.outputs.issues-count }}
  services-checked:
    description: Number of ReadyAPI services checked.
    value: ${{ steps.mockdoctor.outputs.services-checked }}
  operations-checked:
    description: Number of operations checked.
    value: ${{ steps.mockdoctor.outputs.operations-checked }}
  responses-checked:
    description: Number of responses checked.
    value: ${{ steps.mockdoctor.outputs.responses-checked }}
  readyapi-path:
    description: Resolved ReadyAPI path used for the run.
    value: ${{ steps.mockdoctor.outputs.readyapi-path }}
  contract-path:
    description: Resolved contract path used for the run.
    value: ${{ steps.mockdoctor.outputs.contract-path }}
  contract-type:
    description: Contract type used for the run.
    value: ${{ steps.mockdoctor.outputs.contract-type }}
  html-report-path:
    description: Absolute path to the generated HTML report when one was written.
    value: ${{ steps.mockdoctor.outputs.html-report-path }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: ${{ github.action_path }}/package-lock.json

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --no-audit --fund=false

    - name: Build action
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build

    - name: Run MockDoctor
      id: mockdoctor
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
        MOCKDOCTOR_CONFIG: ${{ inputs.config }}
        MOCKDOCTOR_CONTRACT: ${{ inputs.contract }}
        MOCKDOCTOR_FAIL_ON_DRIFT: ${{ inputs.fail-on-drift }}
        MOCKDOCTOR_FORMAT: ${{ inputs.format }}
        MOCKDOCTOR_HTML_REPORT: ${{ inputs.html-report }}
        MOCKDOCTOR_OPENAPI: ${{ inputs.openapi }}
        MOCKDOCTOR_READYAPI: ${{ inputs.readyapi }}
        MOCKDOCTOR_SERVICE: ${{ inputs.service }}
        MOCKDOCTOR_TELEMETRY_ENDPOINT: ${{ inputs.telemetry-endpoint }}
        MOCKDOCTOR_TELEMETRY_TOKEN: ${{ inputs.telemetry-token }}
        MOCKDOCTOR_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: node ./dist/action.js
